server:
  port: 8382

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/keepguard_api_db
    username: keepguard_api_user
    password: keepguard_api_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  data:
    redis:
      cluster:
        nodes: redis-node-1:7000,redis-node-2:7001,redis-node-3:7002,redis-node-4:7003,redis-node-5:7004,redis-node-6:7005
        max-redirects: 3
      password: ""
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms
        cluster:
          refresh:
            adaptive: true
            period: 30s
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_schema: ms_auth
        query:
          startup_check: false

security:
  jwt:
    secret: Q2FjaG9ycm8gU2VndXJhbmNhIFByb2pldG8gS2VlcEd1YXJkIQ==

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

cache:
  redis:
    ttl:
      user: 604800           # 7 dias
      user-roles: 604800     # 7 dias
      role: 604800           # 7 dias
      token: 3600            # 1 hora
      reset-token: 600       # 10 minutos para tokens de reset
    prefix:
      user: "user_cache"
      user-roles: "user_roles_cache"
      role: "role_cache"
      token: "token_cache"
      reset-token: "resetpassword:"
        
springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

# Configuração específica para ambiente de desenvolvimento
logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate: WARN
    com.keepguard.ms_auth: INFO
    com.keepguard.ms_auth.infrastructure.logging: INFO
  # Configuração do Logstash por ambiente - DESABILITADO
  #   port: 5000
  #   enabled: true